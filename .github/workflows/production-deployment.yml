name: Production Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Optional: Require approval before running on production
    # environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://aaritujhokbxezuxcqnm.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhcml0dWpob2tieGV6dXhjcW5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTg0MTUsImV4cCI6MjA4Nzk3NDQxNX0.vQuRvNYt1BfUAiBdvqJDvcx7i9aLZy06NWaMVC_Ps3w
          VITE_APP_ENV: PROD

      - name: Run Unit/Smoke Tests
        run: npm run test
        env:
          VITE_SUPABASE_URL: https://aaritujhokbxezuxcqnm.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhcml0dWpob2tieGV6dXhjcW5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTg0MTUsImV4cCI6MjA4Nzk3NDQxNX0.vQuRvNYt1BfUAiBdvqJDvcx7i9aLZy06NWaMVC_Ps3w

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          VITE_SUPABASE_URL: https://aaritujhokbxezuxcqnm.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhcml0dWpob2tieGV6dXhjcW5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTg0MTUsImV4cCI6MjA4Nzk3NDQxNX0.vQuRvNYt1BfUAiBdvqJDvcx7i9aLZy06NWaMVC_Ps3w

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Deploy Database Migrations (PROD)
        run: |
          supabase migration repair --status applied --db-url "postgresql://postgres.aaritujhokbxezuxcqnm:${{ secrets.PROD_SUPABASE_DB_PASSWORD }}@aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require&pgbouncer=true&prepared_statements=false" 20260312062000
          supabase migration repair --status applied --db-url "postgresql://postgres.aaritujhokbxezuxcqnm:${{ secrets.PROD_SUPABASE_DB_PASSWORD }}@aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require&pgbouncer=true&prepared_statements=false" 20260312062500
          supabase migration repair --status reverted --db-url "postgresql://postgres.aaritujhokbxezuxcqnm:${{ secrets.PROD_SUPABASE_DB_PASSWORD }}@aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require&pgbouncer=true&prepared_statements=false" 20260309220000
          supabase migration repair --status applied --db-url "postgresql://postgres.aaritujhokbxezuxcqnm:${{ secrets.PROD_SUPABASE_DB_PASSWORD }}@aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require&pgbouncer=true&prepared_statements=false" 20260315090000
          supabase migration repair --status applied --db-url "postgresql://postgres.aaritujhokbxezuxcqnm:${{ secrets.PROD_SUPABASE_DB_PASSWORD }}@aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require&pgbouncer=true&prepared_statements=false" 20260315150000
          
          supabase db push --include-all --db-url "postgresql://postgres.aaritujhokbxezuxcqnm:${{ secrets.PROD_SUPABASE_DB_PASSWORD }}@aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require&pgbouncer=true&prepared_statements=false"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-args: "--prod"
